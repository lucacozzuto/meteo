<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Record Mensili</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: #f9f9f9;
            --accent-color: #2563eb;
            --border-color: #e5e5e5;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background-color: var(--card-bg);
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        h1 {
            margin: 0;
            color: var(--accent-color);
        }
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        select {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 1rem;
            cursor: pointer;
        }
        .chart-container {
            position: relative;
            height: 600px;
            width: 100%;
        }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            text-decoration: none;
            color: var(--accent-color);
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .legend-box {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .color-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<header>
    <h1>Record Assoluti di Temperatura Mensile</h1>
    <a href="index.html" class="back-link">&larr; Torna alla Dashboard Principale</a>
</header>

<div class="container">
    <div class="legend-box">
        <div class="legend-item"><div class="color-box" style="background-color: lightgray;"></div> Baseline (1940-1954)</div>
        <div class="legend-item"><div class="color-box" style="background-color: white;"></div> Nessun Record</div>
        <div class="legend-item"><div class="color-box" style="background-color: #ff7f7f;"></div> Nuovo Record</div>
    </div>
    <div class="controls">
        <select id="datasetSelect">
            <option value="Italy">Italia</option>
            <option value="Europe">Europa</option>
        </select>
        <select id="citySelect">
            <!-- Options populated by JS -->
        </select>
    </div>

    <div class="chart-container" id="recordChart"></div>
</div>

<script>
    let recordsData = null;
    // Note: Heatmap y-axis goes from bottom to top in Plotly by default
    const months = ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'];

    const datasetSelect = document.getElementById('datasetSelect');
    const citySelect = document.getElementById('citySelect');

    async function loadData() {
        try {
            const response = await fetch('monthly_records.json');
            recordsData = await response.json();
            updateCityDropdown();
            renderChart();
        } catch (error) {
            console.error("Errore nel caricamento dei dati:", error);
        }
    }

    function updateCityDropdown() {
        const dataset = datasetSelect.value;
        const cities = Object.keys(recordsData[dataset]);

        citySelect.innerHTML = '';
        cities.forEach(city => {
            const option = document.createElement('option');
            option.value = city;
            option.textContent = city;
            citySelect.appendChild(option);
        });
    }

    function renderChart() {
        const dataset = datasetSelect.value;
        const city = citySelect.value;
        const cityData = recordsData[dataset][city];

        const years = cityData.years;
        const records = cityData.records;
        const temps = cityData.temps;

        // Reverse arrays so Jan is at top, Dec at bottom
        let recordsReversed = [...records].reverse();
        let tempsReversed = [...temps].reverse();
        let monthsReversed = [...months].reverse();

        let annotations = [];
        for (let i = 0; i < recordsReversed.length; i++) {
            for (let j = 0; j < recordsReversed[i].length; j++) {
                if (recordsReversed[i][j] === 1) {
                    annotations.push({
                        x: years[j],
                        y: monthsReversed[i],
                        text: tempsReversed[i][j].toFixed(1),
                        showarrow: false,
                        font: {
                            color: 'black',
                            size: 5,
                            weight: 'bold'
                        }
                    });
                }
            }
        }

        var data = [{
            z: recordsReversed,
            x: years,
            y: monthsReversed,
            type: 'heatmap',
            colorscale: [
                [0.0, 'lightgray'],   // maps to -1
                [0.5, 'white'],       // maps to 0
                [1.0, '#ff7f7f']      // maps to 1
            ],
            zmin: -1,
            zmax: 1,
            showscale: false,
            hoverinfo: 'none' // disable default hover, we use annotations
        }];

        var layout = {
            title: `Nuovi Record di Temperatura Massima Assoluta Mensile - ${city}`,
            xaxis: {
                title: 'Anno',
                tickangle: -45,
                dtick: 5
            },
            yaxis: {
                title: 'Mese',
            },
            annotations: annotations,
            margin: { t: 50, r: 20, l: 50, b: 60 },
            plot_bgcolor: "white",
            paper_bgcolor: "white"
        };

        Plotly.newPlot('recordChart', data, layout, {responsive: true});
    }

    datasetSelect.addEventListener('change', () => {
        updateCityDropdown();
        renderChart();
    });

    citySelect.addEventListener('change', renderChart);

    // Initialize
    loadData();
</script>

</body>
</html>
