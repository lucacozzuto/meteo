<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Record Mensili</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: #f9f9f9;
            --accent-color: #2563eb;
            --border-color: #e5e5e5;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background-color: var(--card-bg);
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        h1 {
            margin: 0;
            color: var(--accent-color);
        }
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        select {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 1rem;
            cursor: pointer;
        }
        .chart-container {
            position: relative;
            height: 600px;
            width: 100%;
        }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            text-decoration: none;
            color: var(--accent-color);
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .legend-box {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .color-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<header>
    <h1>Record Assoluti di Temperatura Mensile</h1>
    <a href="index.html" class="back-link">&larr; Torna alla Dashboard Principale</a>
</header>

<div class="container">
    <div class="legend-box">
        <div class="legend-item"><div class="color-box" style="background-color: lightgray;"></div> Baseline (1940-1954)</div>
        <div class="legend-item"><div class="color-box" style="background-color: white;"></div> Nessun Record</div>
        <div class="legend-item"><div class="color-box" style="background-color: #ff7f7f;"></div> Nuovo Record</div>
    </div>
    <div class="controls">
        <select id="datasetSelect">
            <option value="Italy">Italia</option>
            <option value="Europe">Europa</option>
        </select>
        <select id="metricSelect">
            <option value="max">Record di Temperature Massime</option>
            <option value="min">Record di Notti Più Calde (Minima Più Alta)</option>
            <option value="mean">Temperature Medie</option>
        </select>
        <select id="citySelect">
            <!-- Options populated by JS -->
        </select>
    </div>

    <div class="chart-container" id="recordChart"></div>
    <div class="chart-container" id="anomalyChart" style="height: 400px; margin-top: 3rem;"></div>
    
    <div style="margin-top: 5rem; padding-top: 3rem; border-top: 1px solid var(--border-color);">
        <h2 style="text-align: center; color: var(--accent-color);">Panoramica Globale delle Anomalie Termiche</h2>
        <p style="text-align: center; color: #666; margin-bottom: 2rem;">Visualizzazione combinata delle deviazioni dalla media per tutte le città italiane ed europee</p>
        <div class="chart-container" id="allCitiesAnomalyChart" style="height: 1000px;"></div>
    </div>
</div>

<script>
    let recordsData = null;
    // Note: Heatmap y-axis goes from bottom to top in Plotly by default
    const months = ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'];

    const datasetSelect = document.getElementById('datasetSelect');
    const citySelect = document.getElementById('citySelect');

    async function loadData() {
        try {
            const response = await fetch('monthly_records.json');
            recordsData = await response.json();
            updateCityDropdown();
            renderCharts();
        } catch (error) {
            console.error("Errore nel caricamento dei dati:", error);
        }
    }

    function updateCityDropdown() {
        const dataset = datasetSelect.value;
        const cities = Object.keys(recordsData[dataset]);

        citySelect.innerHTML = '';
        cities.forEach(city => {
            const option = document.createElement('option');
            option.value = city;
            option.textContent = city;
            citySelect.appendChild(option);
        });
    }

    function renderCharts() {
        renderHeatmap();
        renderAnomalyChart();
        renderAllCitiesAnomalyChart();
    }

    function renderHeatmap() {
        const dataset = datasetSelect.value;
        const city = citySelect.value;
        const metric = document.getElementById('metricSelect').value;
        const cityData = recordsData[dataset][city];

        const years = cityData.years;
        
        let records = [];
        let temps = [];
        if (metric === 'max') {
            records = cityData.records;
            temps = cityData.temps;
        } else if (metric === 'min') {
            records = cityData.records_min;
            temps = cityData.temps_min;
        } else if (metric === 'mean') {
            records = cityData.mean_temps;
            temps = cityData.mean_temps;
        }

        // Reverse arrays so Jan is at top, Dec at bottom
        let recordsReversed = [...records].reverse();
        let tempsReversed = [...temps].reverse();
        let monthsReversed = [...months].reverse();

        let annotations = [];
        let colorscale = [];
        let zmin, zmax, showscale, hoverinfo;

        if (metric === 'mean') {
            // For mean temps, z is the temperature values directly
            colorscale = [
                [0, '#313695'], [0.25, '#74add1'], [0.5, '#ffffbf'], [0.75, '#f46d43'], [1, '#a50026']
            ];
            let allTemps = records.flat();
            zmin = Math.min(...allTemps);
            zmax = Math.max(...allTemps);
            showscale = true;
            hoverinfo = 'x+y+z';
            // Disable legend-box visually since it's only for records
            document.querySelector('.legend-box').style.display = 'none';
        } else {
            // For records, z is -1, 0, 1
            colorscale = [
                [0.0, 'lightgray'],   // maps to -1
                [0.5, 'white'],       // maps to 0
                [1.0, metric === 'max' ? '#ff7f7f' : '#3b82f6'] // red for max, blue for min
            ];
            zmin = -1;
            zmax = 1;
            showscale = false;
            hoverinfo = 'none';
            document.querySelector('.legend-box').style.display = 'flex';
            
            for (let i = 0; i < recordsReversed.length; i++) {
                for (let j = 0; j < recordsReversed[i].length; j++) {
                    if (recordsReversed[i][j] === 1) {
                        annotations.push({
                            x: years[j],
                            y: monthsReversed[i],
                            text: tempsReversed[i][j].toFixed(1),
                            showarrow: false,
                            font: {
                                color: 'black',
                                size: 5,
                                weight: 'bold'
                            }
                        });
                    }
                }
            }
        }

        var data = [{
            z: recordsReversed,
            x: years,
            y: monthsReversed,
            type: 'heatmap',
            colorscale: colorscale,
            zmin: zmin,
            zmax: zmax,
            showscale: showscale,
            hoverinfo: hoverinfo
        }];

        let titleText = "";
        if (metric === 'max') titleText = `Nuovi Record di Temperatura Massima Assoluta Mensile - ${city}`;
        else if (metric === 'min') titleText = `Nuovi Record di Notti Più Calde (Minima Più Alta) Mensile - ${city}`;
        else titleText = `Temperature Medie Mensili (°C) - ${city}`;

        var layout = {
            title: titleText,
            xaxis: {
                title: 'Anno',
                tickangle: -45,
                dtick: 5
            },
            yaxis: {
                title: 'Mese',
            },
            annotations: annotations,
            margin: { t: 50, r: 20, l: 50, b: 60 },
            plot_bgcolor: "white",
            paper_bgcolor: "white"
        };

        Plotly.newPlot('recordChart', data, layout, {responsive: true});
    }

    function renderAnomalyChart() {
        const dataset = datasetSelect.value;
        const city = citySelect.value;
        const cityData = recordsData[dataset][city];

        if (!cityData.annual_anomalies) return;

        const years = cityData.annual_years;
        const anomalies = cityData.annual_anomalies;

        const markerColors = anomalies.map(a => a >= 0 ? '#ef4444' : '#3b82f6'); // Red for positive, blue for negative

        var data = [{
            x: years,
            y: anomalies,
            type: 'bar',
            marker: {
                color: markerColors
            }
        }];

        var layout = {
            title: `Anomalia Termica Annuale - ${city} (rispetto alla media del periodo)`,
            xaxis: { title: 'Anno', dtick: 5, tickangle: -45 },
            yaxis: { title: 'Anomalia (°C)' },
            margin: { t: 50, r: 20, l: 50, b: 60 },
            plot_bgcolor: "white",
            paper_bgcolor: "white"
        };

        Plotly.newPlot('anomalyChart', data, layout, {responsive: true});
    }

    function renderAllCitiesAnomalyChart() {
        if (!recordsData) return;

        let allCities = [];
        let allAnomalies = [];
        let years = [];

        // Combine both Italy and Europe datasets
        let combinedData = {...recordsData['Europe'], ...recordsData['Italy']};
        
        // Sort alphabetically but reverse so A is at top of Plotly y-axis
        let sortedCities = Object.keys(combinedData).sort().reverse();

        for (let city of sortedCities) {
            const cityData = combinedData[city];
            if (cityData.annual_anomalies) {
                allCities.push(city);
                allAnomalies.push(cityData.annual_anomalies);
                if (years.length === 0) {
                    years = cityData.annual_years;
                }
            }
        }

        // Custom continuous colorscale centered at 0
        const colorscale = [
            [0, '#313695'], [0.25, '#74add1'], [0.5, '#ffffbf'], [0.75, '#f46d43'], [1, '#a50026']
        ];
        
        // Find max absolute anomaly to center the color scale at 0
        let flatAnomalies = allAnomalies.flat().filter(x => x !== null);
        let maxAbs = Math.max(Math.abs(Math.min(...flatAnomalies)), Math.abs(Math.max(...flatAnomalies)));

        var data = [{
            z: allAnomalies,
            x: years,
            y: allCities,
            type: 'heatmap',
            colorscale: colorscale,
            zmin: -maxAbs,
            zmax: maxAbs,
            showscale: true,
            colorbar: {
                title: 'Anomalia (°C)'
            },
            hoverinfo: 'x+y+z'
        }];

        var layout = {
            title: `Warming Stripes: Anomalie Termiche Annuali (Europa e Italia combinate)`,
            xaxis: { title: 'Anno', tickangle: -45, dtick: 5 },
            yaxis: { title: 'Città', automargin: true },
            margin: { t: 50, r: 20, l: 150, b: 60 },
            plot_bgcolor: "white",
            paper_bgcolor: "white"
        };

        Plotly.newPlot('allCitiesAnomalyChart', data, layout, {responsive: true});
    }

    datasetSelect.addEventListener('change', () => {
        updateCityDropdown();
        renderCharts();
    });

    citySelect.addEventListener('change', renderCharts);
    document.getElementById('metricSelect').addEventListener('change', renderHeatmap);

    // Initialize
    loadData();
</script>

</body>
</html>
