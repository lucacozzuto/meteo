<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Record Mensili</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: #f9f9f9;
            --accent-color: #2563eb;
            --border-color: #e5e5e5;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background-color: var(--card-bg);
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        h1 {
            margin: 0;
            color: var(--accent-color);
        }
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        select {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 1rem;
            cursor: pointer;
        }
        .chart-container {
            position: relative;
            height: 500px;
            width: 100%;
        }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            text-decoration: none;
            color: var(--accent-color);
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <h1>Record Assoluti di Temperatura Mensile</h1>
    <a href="index.html" class="back-link">&larr; Torna alla Dashboard Principale</a>
</header>

<div class="container">
    <div class="controls">
        <select id="datasetSelect">
            <option value="Italy">Italia</option>
            <option value="Europe">Europa</option>
        </select>
        <select id="citySelect">
            <!-- Options populated by JS -->
        </select>
    </div>

    <div class="chart-container">
        <canvas id="recordChart"></canvas>
    </div>
</div>

<script>
    let recordsData = null;
    let chartInstance = null;
    const months = ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'];

    const datasetSelect = document.getElementById('datasetSelect');
    const citySelect = document.getElementById('citySelect');

    async function loadData() {
        try {
            const response = await fetch('monthly_records.json');
            recordsData = await response.json();
            updateCityDropdown();
            renderChart();
        } catch (error) {
            console.error("Errore nel caricamento dei dati:", error);
        }
    }

    function updateCityDropdown() {
        const dataset = datasetSelect.value;
        const cities = Object.keys(recordsData[dataset]);

        citySelect.innerHTML = '';
        cities.forEach(city => {
            const option = document.createElement('option');
            option.value = city;
            option.textContent = city;
            citySelect.appendChild(option);
        });
    }

    function renderChart() {
        const dataset = datasetSelect.value;
        const city = citySelect.value;
        const data = recordsData[dataset][city];

        if (chartInstance) {
            chartInstance.destroy();
        }

        const ctx = document.getElementById('recordChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: months,
                datasets: [{
                    label: `Temperatura Max Mensile Record (°C) - ${city}`,
                    data: data,
                    backgroundColor: 'rgba(239, 68, 68, 0.7)',
                    borderColor: 'rgba(220, 38, 38, 1)',
                    borderWidth: 1,
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: false,
                        title: {
                            display: true,
                            text: 'Temperatura (°C)'
                        }
                    }
                },
                plugins: {
                    legend: {
                        position: 'top',
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.parsed.y + ' °C';
                            }
                        }
                    }
                }
            }
        });
    }

    datasetSelect.addEventListener('change', () => {
        updateCityDropdown();
        renderChart();
    });

    citySelect.addEventListener('change', renderChart);

    // Initialize
    loadData();
</script>

</body>
</html>
